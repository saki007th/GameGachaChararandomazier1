<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Guessing Game - v5.2 Penalty System</title>
    <style>
        :root {
            --bg-color: #1e272e;
            --text-color: #ffffff;
            --primary-color: #0fb9b1;
            --danger-color: #fc5c65;
            --success-color: #20bf6b;
            --edit-color: #fed330;
            --panel-bg: #2d3436;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ====================
           Scoreboard System
           ==================== */
        .scoreboard-container {
            position: absolute; top: 20px; left: 20px; background: rgba(45, 52, 54, 0.9);
            border-radius: 8px; padding: 15px; width: 270px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1); z-index: 100; max-height: 80vh;
            display: flex; flex-direction: column; backdrop-filter: blur(5px);
        }
        .scoreboard-header {
            margin-bottom: 10px; font-size: 1.1rem; color: var(--primary-color);
            border-bottom: 1px solid #485460; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .player-list { flex: 1; overflow-y: auto; list-style: none; margin-bottom: 10px; }
        .player-list::-webkit-scrollbar { width: 4px; }
        .player-list::-webkit-scrollbar-thumb { background: #485460; border-radius: 2px; }
        
        .player-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #1e272e; padding: 8px 10px; margin-bottom: 8px;
            border-radius: 6px; cursor: pointer; border-left: 4px solid transparent; transition: all 0.2s;
        }
        .player-item:hover { background: #353b48; }
        .player-item.active { border-left-color: var(--primary-color); background: rgba(15, 185, 177, 0.15); }
        .player-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.95rem; }
        .player-score { font-weight: bold; color: var(--edit-color); font-size: 1.2rem; margin-left: 10px; transition: color 0.3s; }
        /* ถ้าคะแนนติดลบ ให้โชว์สีแดง */
        .player-score.negative { color: var(--danger-color); }
        
        .add-player-box { display: flex; gap: 5px; }
        .add-player-box input {
            flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #485460; background: #1e272e; color: white; width: 100%; outline: none;
        }
        .add-player-box input:focus { border-color: var(--primary-color); }
        .add-player-box button {
            background: var(--primary-color); border: none; color: white; padding: 0 12px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }

        .award-btn {
            background: var(--success-color); border: none; color: white;
            padding: 5px 8px; border-radius: 4px; font-size: 0.85rem;
            cursor: pointer; display: none; font-weight: bold; margin-left: 10px;
            animation: popIn 0.3s ease;
        }
        .award-btn:hover { background: #2ed573; transform: scale(1.05); }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        
        .player-item.can-award .award-btn { display: block; }
        .player-item.can-award .delete-btn { display: none; }
        .delete-btn { background: none; border: none; color: #fc5c65; cursor: pointer; margin-left: 8px; font-size: 1.2rem; opacity: 0.5; }
        .delete-btn:hover { opacity: 1; }

        .top-menu { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; align-items: center; z-index: 100; }
        .btn-menu {
            background: rgba(255, 255, 255, 0.1); color: var(--text-color); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 9px 15px; border-radius: 6px; text-decoration: none; font-size: 0.95rem; transition: all 0.2s; cursor: pointer;
        }
        .btn-menu:hover { background: rgba(255, 255, 255, 0.2); }

        .game-filter-container {
            margin-top: 30px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
            background: rgba(255, 255, 255, 0.05); padding: 12px 20px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); z-index: 10;
        }

        .filter-label {
            display: flex; align-items: center; gap: 8px; color: #d2dae2; cursor: pointer; font-size: 0.95rem; user-select: none; transition: color 0.2s;
        }
        .filter-label:hover { color: var(--text-color); }
        .filter-label input[type="checkbox"] { cursor: pointer; accent-color: var(--primary-color); width: 16px; height: 16px; }

        #game-container {
            text-align: center; display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 800px; padding: 20px; flex: 1; justify-content: center;
        }

        .status-badges { display: flex; gap: 15px; margin-bottom: 20px; }
        .round-bonus-badge, .timer-badge {
            padding: 8px 25px; border-radius: 20px; font-size: 1.2rem; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: inline-block; transition: all 0.3s ease;
        }
        .round-bonus-badge { background: rgba(254, 211, 48, 0.15); color: var(--edit-color); border: 1px solid rgba(254, 211, 48, 0.3); }
        .timer-badge { background: rgba(255, 255, 255, 0.04); color: var(--edit-color); border: 1px solid rgba(254, 211, 48, 0.2); }

        #image-wrapper {
            position: relative; display: inline-flex; justify-content: center; align-items: center;
            min-width: 320px; min-height: 450px; max-height: 50vh; max-width: 100%;
            background-color: rgba(255, 255, 255, 0.02); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #character-img {
            display: block; max-height: 50vh; max-width: 100%; width: auto; height: auto;
            object-fit: contain; pointer-events: none; user-select: none; border-radius: 8px; transition: opacity 0.3s;
        }

        #grid-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: grid; border-radius: 8px; overflow: hidden;
        }

        .grid-tile { 
            background-color: #1e272e; border: 1px solid #485460; transition: opacity 0.3s ease, background-color 0.2s ease, border-color 0.2s ease, backdrop-filter 0.3s ease; 
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            color: rgba(255, 255, 255, 0.25); font-size: 1.5rem; font-weight: bold; user-select: none; position: relative;
        }
        .grid-tile:hover { background-color: #2d3436; color: rgba(255, 255, 255, 0.6); }
        
        .grid-tile.locked {
            background-color: transparent !important;
            color: rgba(252, 92, 101, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); 
        }
        .grid-tile.locked::after {
            content: "🔒"; position: absolute; font-size: 1.5rem; color: var(--danger-color);
            opacity: 0.8; pointer-events: none; transition: 0.2s ease;
        }
        .grid-tile.locked:hover::after { opacity: 1; transform: scale(1.15); }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border-color: rgba(252, 92, 101, 0.5) !important; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(3px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-5px, 0, 0); }
            40%, 60% { transform: translate3d(5px, 0, 0); }
        }

        #loading-indicator {
            position: absolute; display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: var(--primary-color); font-weight: bold; font-size: 1.1rem;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #loading-indicator.show { opacity: 1; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(15, 185, 177, 0.3); border-top: 4px solid var(--primary-color); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Guessing System UI */
        .guessing-section { margin-top: 20px; display: flex; gap: 10px; width: 100%; max-width: 400px; align-items: center; flex-direction: column; }
        .guessing-input-group { display: flex; gap: 10px; width: 100%; }
        .guessing-input-group input {
            flex: 1; padding: 12px 15px; border-radius: 8px; border: 2px solid #485460; background: rgba(0,0,0,0.3); color: white; font-size: 1.1rem; outline: none; text-align: center;
        }
        .guessing-input-group input:focus { border-color: var(--primary-color); }
        .guessing-input-group button {
            background: var(--primary-color); border: none; color: white; padding: 0 20px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .guessing-input-group button:hover { background: #0c9c95; }
        .guess-feedback { font-weight: bold; font-size: 1.1rem; height: 25px; transition: 0.2s; }

        #character-info { margin-top: 15px; opacity: 0; transform: translateY(10px); transition: opacity 0.4s ease, transform 0.4s ease; height: 90px; }
        #character-info.revealed { opacity: 1; transform: translateY(0); }
        #char-name { font-size: 2.5rem; margin-bottom: 5px; color: var(--primary-color); text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        #char-game { font-size: 1.2rem; color: #d2dae2; }

        .controls-hint { margin-top: 10px; padding: 10px 20px; background: rgba(255, 255, 255, 0.05); border-radius: 8px; color: #808e9b; font-size: 0.9rem; letter-spacing: 0.5px; }
        kbd { background-color: #485460; padding: 3px 8px; border-radius: 4px; color: white; font-family: monospace; }

        /* History Modal */
        #history-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85);
            display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #history-modal.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--panel-bg); width: 90%; max-width: 500px; max-height: 80vh;
            border-radius: 12px; padding: 25px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #485460; padding-bottom: 15px; }
        .close-btn { background: none; border: none; color: #aaa; font-size: 28px; cursor: pointer; line-height: 1; }
        .close-btn:hover { color: white; }
        .history-list { flex: 1; overflow-y: auto; list-style: none; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: #485460; border-radius: 3px; }
        .history-item {
            display: flex; align-items: center; gap: 15px; background: #1e272e; padding: 10px; margin-bottom: 10px;
            border-radius: 8px; border-left: 4px solid var(--primary-color);
        }
        .history-img { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; background: #000; }
        .history-info { display: flex; flex-direction: column; overflow: hidden; }
        .history-info strong { font-size: 1.05rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--primary-color); }
        .history-info small { color: #d2dae2; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .app-version { position: absolute; bottom: 10px; right: 15px; font-size: 0.8rem; color: rgba(255,255,255,0.3); pointer-events: none; }
    </style>
</head>
<body>

    <div class="scoreboard-container">
        <div class="scoreboard-header">
            <span>👥 ผู้เล่น & คะแนน</span>
            <button style="background:none; border:none; color:var(--danger-color); cursor:pointer; font-size:0.8rem;" onclick="resetScores()">รีเซ็ต</button>
        </div>
        <ul class="player-list" id="players-list"></ul>
        <div class="add-player-box">
            <input type="text" id="new-player-name" placeholder="เพิ่มชื่อผู้เล่น..." onkeypress="if(event.key === 'Enter') addPlayer()">
            <button onclick="addPlayer()">+</button>
        </div>
    </div>

    <div class="top-menu">
        <button id="btn-history" class="btn-menu">🕒 ประวัติการทาย</button>
        <a href="admin.html" id="admin-link" class="btn-menu">⚙️ จัดการข้อมูล (Local)</a>
    </div>

    <div class="game-filter-container" id="game-filters">
        <label class="filter-label" style="margin-right: 15px; border-right: 1px solid #485460; padding-right: 15px;">
            <input type="checkbox" id="toggle-timer" checked> ⏳ เปิดจับเวลา 15 วิ
        </label>
        
        <label class="filter-label"><input type="checkbox" value="Genshin Impact" checked> Genshin Impact</label>
        <label class="filter-label"><input type="checkbox" value="Honkai: Star Rail" checked> Honkai: Star Rail</label>
        <label class="filter-label"><input type="checkbox" value="Arknights" checked> Arknights</label>
        <label class="filter-label"><input type="checkbox" value="Blue Archive" checked> Blue Archive</label>
        <label class="filter-label"><input type="checkbox" value="Zenless Zone Zero" checked> Zenless Zone Zero</label>
    </div>

    <div id="game-container">
        <div class="status-badges">
            <div class="round-bonus-badge">
                🏆 โบนัส: <span id="round-bonus-display">36</span>
            </div>
            <div class="timer-badge" id="timer-display">⏳ รอเปิดป้าย...</div>
        </div>

        <div id="image-wrapper">
            <div id="loading-indicator">
                <div class="spinner"></div>
                <span id="loading-text">กำลังค้นหาตัวละครใหม่...</span>
            </div>
            <img id="character-img" src="" alt="Gacha Character">
            <div id="grid-overlay"></div>
        </div>

        <div class="guessing-section" id="guessing-section">
            <div class="guessing-input-group">
                <input type="text" id="guess-input" placeholder="พิมพ์ชื่อตัวละครที่นี่..." autocomplete="off">
                <button onclick="submitGuess()">ตอบ!</button>
            </div>
            <div class="guess-feedback" id="guess-feedback"></div>
        </div>
        
        <div id="character-info">
            <h1 id="char-name">ชื่อตัวละคร</h1>
            <h2 id="char-game">จากเกม</h2>
        </div>

        <div class="controls-hint">
            <kbd>คลิกป้าย</kbd> เปิดช่อง&nbsp;&nbsp;|&nbsp;&nbsp;<kbd>R</kbd> เฉลย/ยอมแพ้&nbsp;&nbsp;|&nbsp;&nbsp;<kbd>Enter</kbd> สุ่มตัวถัดไป
        </div>
    </div>

    <div id="history-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🕒 ประวัติการทาย (รอบนี้)</h2>
                <button class="close-btn" id="close-history-btn">&times;</button>
            </div>
            <ul class="history-list" id="history-list"></ul>
        </div>
    </div>

    <div class="app-version">v5.2 - Penalty System</div>

    <script>
        const GAME_TAGS = {
            "Genshin Impact": "genshin_impact",
            "Honkai: Star Rail": "honkai:_star_rail",
            "Arknights": "arknights",
            "Blue Archive": "blue_archive",
            "Zenless Zone Zero": "zenless_zone_zero"
        };

        let localCharacters = []; 
        let currentCharacter = null;
        let isRevealed = false;
        let isLoading = false;
        let unrevealedTiles = [];
        let playHistory = []; 
        let retryCount = 0;
        
        let players = JSON.parse(localStorage.getItem('gachaPlayers')) || [];
        let activePlayerId = null;
        let hasAwarded = false;

        let timerInterval = null;
        let timeLeft = 15;

        const UNLOCK_THRESHOLD = 12;
        const LOCKED_COUNT = 6; 
        const PENALTY_POINTS = 5; // คะแนนติดลบเมื่อตอบผิด

        const MAX_RETRIES = 10; 
        const GRID_ROWS = 6; 
        const GRID_COLS = 6; 

        const dom = {
            img: document.getElementById('character-img'),
            gridOverlay: document.getElementById('grid-overlay'),
            infoBox: document.getElementById('character-info'),
            nameDisplay: document.getElementById('char-name'),
            gameDisplay: document.getElementById('char-game'),
            loading: document.getElementById('loading-indicator'),
            loadingText: document.getElementById('loading-text'),
            filterCheckboxes: document.querySelectorAll('#game-filters input[type="checkbox"]'),
            btnHistory: document.getElementById('btn-history'),
            historyModal: document.getElementById('history-modal'),
            closeHistoryBtn: document.getElementById('close-history-btn'),
            historyList: document.getElementById('history-list'),
            playersList: document.getElementById('players-list'),
            newPlayerInput: document.getElementById('new-player-name'),
            roundBonusDisplay: document.getElementById('round-bonus-display'),
            timerDisplay: document.getElementById('timer-display'),
            toggleTimer: document.getElementById('toggle-timer'),
            guessingSection: document.getElementById('guessing-section'),
            guessInput: document.getElementById('guess-input'),
            guessFeedback: document.getElementById('guess-feedback')
        };

        function init() {
            loadLocalData();
            setupEventListeners();
            renderPlayers();
            loadRandomCharacter();

            window.addEventListener('storage', (e) => {
                if (e.key === 'gachaGameData') loadLocalData();
                if (e.key === 'gachaPlayers') {
                    players = JSON.parse(localStorage.getItem('gachaPlayers')) || [];
                    renderPlayers();
                }
            });
        }

        function loadLocalData() {
            const rawData = localStorage.getItem('gachaGameData');
            if (rawData) localCharacters = JSON.parse(rawData);
            else localCharacters = [];
        }

        function formatCharacterName(tagString) {
            if (!tagString) return null;
            let firstTag = tagString.split(' ')[0];
            firstTag = firstTag.replace(/\_\([^)]+\)/g, '');
            firstTag = firstTag.replace(/\([^)]+\)/g, '');
            let nameWithSpaces = firstTag.replace(/_/g, ' ');
            return nameWithSpaces.replace(/\b\w/g, char => char.toUpperCase()).trim();
        }

        function handleAutoRetry(errorMessage) {
            if (retryCount < MAX_RETRIES) {
                retryCount++;
                dom.loadingText.textContent = `ค้นหาตัวละครใหม่... (ครั้งที่ ${retryCount})`;
                isLoading = false; 
                setTimeout(() => loadRandomCharacter(), 800);
            } else {
                isLoading = false;
                retryCount = 0;
                showError(errorMessage + " (ข้ามภาพอัตโนมัติเกินขีดจำกัด)");
            }
        }

        async function loadRandomCharacter() {
            if (isLoading) return;

            const selectedGames = Array.from(dom.filterCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
            if (selectedGames.length === 0) {
                alert("กรุณาเลือกเกมอย่างน้อย 1 เกมครับ!");
                return;
            }

            isLoading = true;
            isRevealed = false;
            hasAwarded = false; 
            
            dom.guessInput.value = '';
            dom.guessFeedback.textContent = '';
            dom.guessingSection.style.display = 'flex'; 
            
            dom.img.style.opacity = 0; 
            dom.gridOverlay.innerHTML = ''; 
            dom.infoBox.classList.remove('revealed');
            dom.loading.classList.add('show');
            resetTimerUI();
            renderPlayers(); 
            
            if (retryCount === 0) dom.loadingText.textContent = "กำลังค้นหาตัวละครแบบสุ่ม...";

            const localFiltered = localCharacters.filter(char => selectedGames.includes(char.game));
            const pickFromLocal = (localFiltered.length > 0 && Math.random() < 0.15);

            try {
                if (pickFromLocal) {
                    const localChar = localFiltered[Math.floor(Math.random() * localFiltered.length)];
                    currentCharacter = { name: localChar.name, game: localChar.game };
                    dom.img.src = localChar.url;
                } else {
                    const randomGame = selectedGames[Math.floor(Math.random() * selectedGames.length)];
                    const gameApiTag = GAME_TAGS[randomGame];
                    const searchTags = `solo ${gameApiTag}`;
                    
                    const randomPage = Math.floor(Math.random() * 5) + 1;
                    const targetApiUrl = `https://safebooru.donmai.us/posts.json?limit=50&page=${randomPage}&tags=${encodeURIComponent(searchTags)}`;
                    
                    const response = await fetch(targetApiUrl);
                    if (!response.ok) throw new Error(`HTTP Error ${response.status}`);

                    const data = await response.json();
                    
                    const validPosts = data.filter(post => 
                        post.tag_string_character &&
                        (post.large_file_url || post.file_url) && 
                        !['mp4', 'zip', 'gif', 'webm'].includes(post.file_ext)
                    );

                    if (validPosts.length > 0) {
                        const randomPost = validPosts[Math.floor(Math.random() * validPosts.length)];
                        const extractedName = formatCharacterName(randomPost.tag_string_character);
                        
                        if (extractedName) {
                            currentCharacter = { name: extractedName, game: randomGame };
                            dom.img.src = randomPost.large_file_url || randomPost.file_url;
                        } else {
                            throw new Error("สกัดชื่อตัวละครไม่สำเร็จ");
                        }
                    } else {
                        throw new Error("ไม่พบภาพที่ใช้งานได้ในหน้านี้");
                    }
                }
            } catch (error) {
                console.warn("Fetch Error (Retrying):", error.message);
                handleAutoRetry(`ภาพไม่มีคำตอบ หรือถูกบล็อกการเชื่อมต่อ`);
            }
        }

        dom.img.onload = () => {
            if(!currentCharacter) return;
            retryCount = 0; 
            dom.loading.classList.remove('show');
            dom.img.style.opacity = 1; 
            createGrid();
            isLoading = false;
        };

        dom.img.onerror = () => handleAutoRetry("ไฟล์รูปต้นทางเสียหาย หรือถูกบล็อก");

        function showError(message) {
            dom.loading.classList.remove('show');
            dom.img.style.opacity = 0; 
            unrevealedTiles = []; 
            dom.gridOverlay.innerHTML = `
                <div style="background: rgba(252, 92, 101, 0.1); border: 2px dashed #fc5c65; border-radius: 8px; color: #fc5c65; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; padding: 20px; text-align: center;">
                    <span style="font-size: 3rem; margin-bottom: 10px;">⚠️</span>
                    <strong style="font-size: 1.2rem;">ข้อผิดพลาด</strong>
                    <p style="font-size: 0.9rem; margin-top: 5px; color: #d2dae2;">${message}</p>
                    <small style="margin-top: 15px;">กด Enter เพื่อสั่งสุ่มใหม่</small>
                </div>
            `;
            if (currentCharacter) {
                dom.nameDisplay.textContent = currentCharacter.name;
                dom.gameDisplay.textContent = currentCharacter.game;
            }
            dom.infoBox.classList.add('revealed'); 
            renderPlayers();
        }

        // ==========================================
        // ระบบ Locked Grid
        // ==========================================
        function createGrid() {
            dom.gridOverlay.innerHTML = '';
            dom.gridOverlay.style.gridTemplateColumns = `repeat(${GRID_COLS}, 1fr)`;
            dom.gridOverlay.style.gridTemplateRows = `repeat(${GRID_ROWS}, 1fr)`;
            unrevealedTiles = [];
            
            const totalTilesCount = GRID_ROWS * GRID_COLS;
            const indices = Array.from({length: totalTilesCount}, (_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            const lockedIndices = indices.slice(0, LOCKED_COUNT);
            
            for (let i = 0; i < totalTilesCount; i++) {
                const tile = document.createElement('div');
                tile.className = 'grid-tile';
                tile.textContent = i + 1;
                
                if (lockedIndices.includes(i)) {
                    tile.classList.add('locked');
                    tile.dataset.isLocked = "true"; 
                } else {
                    tile.dataset.isLocked = "false";
                }
                
                tile.addEventListener('click', function() {
                    if (isRevealed || this.style.opacity === '0' || isLoading) return;
                    
                    if (this.dataset.isLocked === "true") {
                        const openedCount = totalTilesCount - unrevealedTiles.length;
                        if (openedCount < UNLOCK_THRESHOLD) {
                            this.classList.remove('shake');
                            void this.offsetWidth; 
                            this.classList.add('shake');
                            
                            dom.guessFeedback.textContent = `🔒 ต้องเปิดป้ายปกติอีก ${UNLOCK_THRESHOLD - openedCount} แผ่น เพื่อปลดล็อก!`;
                            dom.guessFeedback.style.color = "var(--edit-color)";
                            return; 
                        } else {
                            this.classList.remove('locked');
                            this.dataset.isLocked = "false";
                        }
                    }

                    this.style.opacity = '0';
                    const index = unrevealedTiles.indexOf(this);
                    if (index > -1) unrevealedTiles.splice(index, 1);
                    
                    updateLockedTilesVisuals();
                    renderPlayers();
                    startTimer();
                    checkIfAllRevealed();
                });
                
                dom.gridOverlay.appendChild(tile);
                unrevealedTiles.push(tile);
            }
            renderPlayers();
        }

        function updateLockedTilesVisuals() {
            const totalTilesCount = GRID_ROWS * GRID_COLS;
            const openedCount = totalTilesCount - unrevealedTiles.length;
            if (openedCount >= UNLOCK_THRESHOLD) {
                unrevealedTiles.forEach(tile => {
                    if (tile.dataset.isLocked === "true") {
                        tile.classList.remove('locked');
                        tile.dataset.isLocked = "false";
                    }
                });
                if (openedCount === UNLOCK_THRESHOLD && !isRevealed) {
                    dom.guessFeedback.textContent = "🔓 ปลดล็อกแผ่นป้ายพิเศษแล้ว!";
                    dom.guessFeedback.style.color = "var(--success-color)";
                    setTimeout(() => {
                        if(dom.guessFeedback.textContent.includes("ปลดล็อก")) dom.guessFeedback.textContent = "";
                    }, 3000);
                }
            }
        }

        function openRandomTile() {
            if (isRevealed || unrevealedTiles.length === 0 || isLoading) return;
            const totalTilesCount = GRID_ROWS * GRID_COLS;
            const openedCount = totalTilesCount - unrevealedTiles.length;
            
            const availableTiles = unrevealedTiles.filter(tile => 
                tile.dataset.isLocked === "false" || openedCount >= UNLOCK_THRESHOLD
            );
            
            if (availableTiles.length === 0) return; 
            
            const randomIndex = Math.floor(Math.random() * availableTiles.length);
            const tileToOpen = availableTiles[randomIndex];
            
            tileToOpen.style.opacity = '0';
            
            const realIndex = unrevealedTiles.indexOf(tileToOpen);
            if (realIndex > -1) unrevealedTiles.splice(realIndex, 1);
            
            updateLockedTilesVisuals();
            renderPlayers();
            startTimer(); 
            checkIfAllRevealed();
        }

        function revealAll() {
            if (isRevealed || !currentCharacter || isLoading) return;
            unrevealedTiles.forEach(tile => {
                tile.classList.remove('locked');
                tile.style.opacity = '0';
            });
            revealCharacterInfo();
        }

        // ==========================================
        // ระบบตรวจคำตอบ และ หักคะแนน
        // ==========================================
        function checkAnswerSimilarity(guess, actual) {
            let a = actual.toLowerCase().replace(/[^a-z0-9]/g, '');
            let b = guess.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (b.length === 0) return false;
            
            if (a.includes(b) && b.length >= 4) return true;
            if (b.includes(a) && a.length >= 4) return true;
            
            let matrix = [];
            for(let i = 0; i <= b.length; i++){ matrix[i] = [i]; }
            for(let j = 0; j <= a.length; j++){ matrix[0][j] = j; }
            
            for(let i = 1; i <= b.length; i++){
                for(let j = 1; j <= a.length; j++){
                    if(b.charAt(i-1) == a.charAt(j-1)){
                        matrix[i][j] = matrix[i-1][j-1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i-1][j-1] + 1, Math.min(matrix[i][j-1] + 1, matrix[i-1][j] + 1));
                    }
                }
            }
            let distance = matrix[b.length][a.length];
            let similarityPercentage = (1 - distance / Math.max(a.length, b.length)) * 100;
            return similarityPercentage >= 70;
        }

        window.submitGuess = function() {
            if (isRevealed || !currentCharacter) return;
            const guess = dom.guessInput.value.trim();
            if(!guess) return;

            const isCorrect = checkAnswerSimilarity(guess, currentCharacter.name);
            
            if(isCorrect) {
                dom.guessFeedback.textContent = "✅ ถูกต้องยอดเยี่ยม!";
                dom.guessFeedback.style.color = "var(--success-color)";
                
                const currentBonus = unrevealedTiles.length > 0 ? unrevealedTiles.length : 36;
                if(activePlayerId && !hasAwarded) awardPoints(activePlayerId, currentBonus);
                
                revealAll();
            } else {
                // ทายผิด หักคะแนนผู้เล่นที่กำลังเลือกอยู่
                let penaltyMsg = "❌ ยังไม่ถูก ลองพิมพ์ใหม่!";
                
                if(activePlayerId) {
                    const player = players.find(p => p.id === activePlayerId);
                    if(player) {
                        player.score -= PENALTY_POINTS; // หัก 5 คะแนน
                        savePlayers();
                        renderPlayers();
                        penaltyMsg = `❌ ยังไม่ถูก! โดนหัก ${PENALTY_POINTS} คะแนน`;
                    }
                }

                dom.guessFeedback.textContent = penaltyMsg;
                dom.guessFeedback.style.color = "var(--danger-color)";
                dom.guessInput.value = '';
                dom.guessInput.focus();
                
                dom.guessFeedback.style.transform = "translateX(-10px)";
                setTimeout(() => dom.guessFeedback.style.transform = "translateX(10px)", 100);
                setTimeout(() => dom.guessFeedback.style.transform = "translateX(0)", 200);
            }
        };

        // --- ระบบควบคุมจับเวลา ---
        function startTimer() {
            if (isRevealed || isLoading) return;
            clearInterval(timerInterval);
            
            if (!dom.toggleTimer.checked) {
                dom.timerDisplay.style.display = 'none';
                return;
            }
            dom.timerDisplay.style.display = 'inline-block';
            
            timeLeft = 15;
            dom.timerDisplay.textContent = `⏱️ เวลาที่เหลือ: ${timeLeft} วิ`;
            dom.timerDisplay.style.color = "var(--edit-color)";
            dom.timerDisplay.style.borderColor = "rgba(254, 211, 48, 0.2)";
            dom.timerDisplay.style.background = "rgba(255, 255, 255, 0.04)";

            timerInterval = setInterval(() => {
                timeLeft--;
                dom.timerDisplay.textContent = `⏱️ เวลาที่เหลือ: ${timeLeft} วิ`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    dom.timerDisplay.textContent = "⏰ หมดเวลา! เปิดช่องใหม่เพื่อเริ่มนับใหม่";
                    dom.timerDisplay.style.color = "var(--danger-color)";
                    dom.timerDisplay.style.borderColor = "rgba(252, 92, 165, 0.3)";
                    dom.timerDisplay.style.background = "rgba(252, 92, 165, 0.05)";
                }
            }, 1000);
        }

        function resetTimerUI() {
            clearInterval(timerInterval);
            timeLeft = 15;
            if(!dom.toggleTimer.checked) {
                dom.timerDisplay.style.display = 'none';
                return;
            }
            dom.timerDisplay.style.display = 'inline-block';
            dom.timerDisplay.textContent = "⏳ รอเปิดป้าย...";
            dom.timerDisplay.style.color = "var(--edit-color)";
            dom.timerDisplay.style.borderColor = "rgba(254, 211, 48, 0.2)";
            dom.timerDisplay.style.background = "rgba(255, 255, 255, 0.04)";
        }

        // --- Scoreboard ---
        function savePlayers() { localStorage.setItem('gachaPlayers', JSON.stringify(players)); }

        function renderPlayers() {
            dom.playersList.innerHTML = '';
            const currentBonus = unrevealedTiles.length > 0 ? unrevealedTiles.length : (isRevealed ? 0 : 36);
            if (dom.roundBonusDisplay) dom.roundBonusDisplay.textContent = currentBonus;

            const isAwardPhase = isRevealed && !isLoading && currentCharacter && !hasAwarded;
            const sortedPlayers = [...players].sort((a, b) => b.score - a.score);

            if(sortedPlayers.length === 0) {
                dom.playersList.innerHTML = '<li style="text-align:center; color:#808e9b; font-size:0.85rem; padding:10px;">เพิ่มชื่อผู้เล่นด้านล่าง</li>';
                return;
            }

            sortedPlayers.forEach(p => {
                const isNegative = p.score < 0;
                const li = document.createElement('li');
                li.className = `player-item ${p.id === activePlayerId ? 'active' : ''} ${isAwardPhase ? 'can-award' : ''}`;
                li.onclick = (e) => {
                    if(!e.target.closest('button')) {
                        activePlayerId = p.id;
                        renderPlayers();
                    }
                };
                li.innerHTML = `
                    <span class="player-name">${p.name}</span>
                    <span class="player-score ${isNegative ? 'negative' : ''}">${p.score}</span>
                    ${isAwardPhase ? `<button class="award-btn" onclick="awardPoints('${p.id}', ${currentBonus}); event.stopPropagation();">+${currentBonus}</button>` : ''}
                    ${!isAwardPhase ? `<button class="delete-btn" onclick="removePlayer('${p.id}'); event.stopPropagation();" title="ลบผู้เล่น">×</button>` : ''}
                `;
                dom.playersList.appendChild(li);
            });
        }

        window.addPlayer = function() {
            const name = dom.newPlayerInput.value.trim();
            if(name) {
                players.push({ id: Date.now().toString(), name: name, score: 0 });
                savePlayers();
                dom.newPlayerInput.value = '';
                if(players.length === 1) activePlayerId = players[0].id;
                renderPlayers();
            }
        };

        window.removePlayer = function(id) {
            if(confirm('ต้องการลบผู้เล่นนี้ใช่หรือไม่?')) {
                players = players.filter(p => p.id !== id);
                if(activePlayerId === id) activePlayerId = players.length > 0 ? players[0].id : null;
                savePlayers();
                renderPlayers();
            }
        };

        window.resetScores = function() {
            if(confirm('ต้องการรีเซ็ตคะแนนทุกคนเป็น 0 ใช่หรือไม่?')) {
                players.forEach(p => p.score = 0);
                savePlayers();
                renderPlayers();
            }
        };

        window.awardPoints = function(id, points) {
            if(hasAwarded) return; 
            const player = players.find(p => p.id === id);
            if(player) {
                player.score += points;
                hasAwarded = true; 
                savePlayers();
                renderPlayers(); 
            }
        };

        // --- History Modal ---
        function checkIfAllRevealed() {
            if (unrevealedTiles.length === 0) revealCharacterInfo();
        }

        function revealCharacterInfo() {
            if (isRevealed) return;
            isRevealed = true;
            
            clearInterval(timerInterval);
            if(dom.toggleTimer.checked) dom.timerDisplay.textContent = "🏁 เฉลยแล้ว!";
            
            dom.guessingSection.style.display = 'none';
            
            if (currentCharacter) {
                dom.nameDisplay.textContent = currentCharacter.name;
                dom.gameDisplay.textContent = currentCharacter.game;
            }

            dom.infoBox.classList.add('revealed');
            renderPlayers();
            
            if (currentCharacter && dom.img.src) {
                if (playHistory.length === 0 || playHistory[0].url !== dom.img.src) {
                    playHistory.unshift({ name: currentCharacter.name, game: currentCharacter.game, url: dom.img.src });
                }
            }
        }

        function openHistoryModal() {
            dom.historyList.innerHTML = '';
            if (playHistory.length === 0) {
                dom.historyList.innerHTML = '<li style="text-align:center; color:#808e9b; padding:20px;">ยังไม่มีประวัติการทายในรอบนี้</li>';
            } else {
                playHistory.forEach((item) => {
                    const li = document.createElement('li');
                    li.className = 'history-item';
                    li.innerHTML = `
                        <img src="${item.url}" alt="History Image" class="history-img" onerror="this.src='https://placehold.co/60x60/2d3436/0fb9b1?text=Error'">
                        <div class="history-info">
                            <strong>${item.name}</strong>
                            <small>${item.game}</small>
                        </div>
                    `;
                    dom.historyList.appendChild(li);
                });
            }
            dom.historyModal.classList.add('show');
            dom.btnHistory.blur();
        }

        function closeHistoryModal() { dom.historyModal.classList.remove('show'); }

        // --- Listeners ---
        function setupEventListeners() {
            dom.filterCheckboxes.forEach(cb => { cb.addEventListener('change', function() { this.blur(); }); });
            dom.toggleTimer.addEventListener('change', function() { resetTimerUI(); this.blur(); });
            dom.btnHistory.addEventListener('click', openHistoryModal);
            dom.closeHistoryBtn.addEventListener('click', closeHistoryModal);

            dom.guessInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') submitGuess();
            });

            document.addEventListener('keydown', (e) => {
                if (document.activeElement.tagName === 'INPUT') return;
                if (dom.historyModal.classList.contains('show')) return; 

                if (e.code === 'Space') {
                    e.preventDefault(); 
                    if (!isRevealed) openRandomTile();
                } else if (e.code === 'KeyR') {
                    e.preventDefault();
                    revealAll();
                } else if (e.code === 'Enter') {
                    e.preventDefault();
                    if (!isRevealed && currentCharacter) {
                        unrevealedTiles = []; 
                        revealAll();
                    }
                    if (!isLoading) {
                        retryCount = 0; 
                        loadRandomCharacter();
                    }
                }
            });
        }

        init();
    </script>
</body>
</html>

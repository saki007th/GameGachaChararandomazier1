<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Guessing Game - v6.0 Modern UI</title>
    <style>
        :root {
            --bg-color-top: #2f3640;
            --bg-color-bottom: #1e272e;
            --text-color: #ffffff;
            --primary-color: #0fb9b1;
            --danger-color: #fc5c65;
            --success-color: #20bf6b;
            --edit-color: #fed330;
            --panel-bg: rgba(45, 52, 54, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            /* ปรับพื้นหลังให้มีมิติไล่สี */
            background: radial-gradient(circle at 50% 0%, var(--bg-color-top), var(--bg-color-bottom));
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ====================
           Scoreboard System
           ==================== */
        .scoreboard-container {
            position: absolute; top: 20px; left: 20px; background: var(--panel-bg);
            border-radius: 12px; padding: 15px; width: 280px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.08); z-index: 100; max-height: 80vh;
            display: flex; flex-direction: column; backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .scoreboard-header {
            margin-bottom: 12px; font-size: 1.1rem; color: var(--primary-color);
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .player-list { flex: 1; overflow-y: auto; list-style: none; margin-bottom: 10px; }
        .player-list::-webkit-scrollbar { width: 5px; }
        .player-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        
        .player-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.2); padding: 10px 12px; margin-bottom: 8px;
            border-radius: 8px; cursor: pointer; border-left: 4px solid transparent; transition: all 0.2s ease;
        }
        .player-item:hover { background: rgba(255,255,255,0.05); transform: translateX(2px); }
        .player-item.active { border-left-color: var(--primary-color); background: rgba(15, 185, 177, 0.15); box-shadow: inset 0 0 10px rgba(15, 185, 177, 0.1); }
        .player-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.95rem; }
        .player-score { font-weight: bold; color: var(--edit-color); font-size: 1.2rem; margin-left: 10px; transition: color 0.3s; }
        .player-score.negative { color: var(--danger-color); }
        
        .add-player-box { display: flex; gap: 8px; }
        .add-player-box input {
            flex: 1; padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; width: 100%; outline: none; transition: 0.2s;
        }
        .add-player-box input:focus { border-color: var(--primary-color); background: rgba(0,0,0,0.5); }
        .add-player-box button {
            background: var(--primary-color); border: none; color: white; padding: 0 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }

        .award-btn {
            background: var(--success-color); border: none; color: white;
            padding: 6px 10px; border-radius: 6px; font-size: 0.85rem;
            cursor: pointer; display: none; font-weight: bold; margin-left: 10px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(32, 191, 107, 0.3);
        }
        .award-btn:hover { background: #2ed573; transform: scale(1.05); }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        
        .player-item.can-award .award-btn { display: block; }
        .player-item.can-award .delete-btn { display: none; }
        .delete-btn { background: none; border: none; color: #fc5c65; cursor: pointer; margin-left: 8px; font-size: 1.2rem; opacity: 0.5; transition: 0.2s; }
        .delete-btn:hover { opacity: 1; transform: scale(1.2); }

        .top-menu { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; align-items: center; z-index: 100; }
        .btn-menu {
            background: rgba(255, 255, 255, 0.05); color: var(--text-color); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px; border-radius: 8px; text-decoration: none; font-size: 0.95rem; transition: all 0.2s; cursor: pointer; backdrop-filter: blur(5px);
        }
        .btn-menu:hover { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.3); }

        /* Tactile Feedback สำหรับปุ่มทั้งหมด */
        button:active, .btn-menu:active { transform: scale(0.95); }

        .game-filter-container {
            margin-top: 30px; display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
            background: rgba(0, 0, 0, 0.2); padding: 15px 25px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); z-index: 10;
            backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .filter-label {
            display: flex; align-items: center; gap: 8px; color: #d2dae2; cursor: pointer; font-size: 0.95rem; user-select: none; transition: color 0.2s;
        }
        .filter-label:hover { color: var(--text-color); }
        .filter-label input[type="checkbox"] { cursor: pointer; accent-color: var(--primary-color); width: 16px; height: 16px; }

        #game-container {
            text-align: center; display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 900px; padding: 20px; flex: 1; justify-content: center;
        }

        .status-badges { display: flex; gap: 15px; margin-bottom: 20px; }
        .round-bonus-badge, .timer-badge {
            padding: 10px 30px; border-radius: 30px; font-size: 1.25rem; font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2); display: inline-block; transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px);
        }
        .round-bonus-badge { background: rgba(254, 211, 48, 0.15); color: var(--edit-color); }
        .timer-badge { background: rgba(255, 255, 255, 0.05); color: var(--edit-color); }

        /* ปรับปรุงพื้นที่แสดงภาพตรงกลางให้ใหญ่ขึ้น และดูพรีเมียม */
        #image-wrapper {
            position: relative; display: inline-flex; justify-content: center; align-items: center;
            min-width: 320px; min-height: 450px; max-height: 65vh; max-width: 100%;
            background-color: rgba(0, 0, 0, 0.3); border-radius: 12px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 20px rgba(15, 185, 177, 0.1); /* Glow Effect */
            border: 1px solid rgba(255, 255, 255, 0.08);
            perspective: 1000px; /* รองรับ 3D Animation */
        }

        #character-img {
            display: block; max-height: 65vh; max-width: 100%; width: auto; height: auto;
            object-fit: contain; pointer-events: none; user-select: none; border-radius: 12px; transition: opacity 0.4s ease;
        }

        #grid-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: grid; border-radius: 12px; overflow: hidden;
            perspective: 1000px;
        }

        /* ====================
           3D Grid & Blurred Locked Tiles CSS
           ==================== */
        .grid-tile { 
            background-color: #2d3436; border: 1px solid rgba(255,255,255,0.05); 
            /* แอนิเมชัน 3 มิติ เด้งดึ๋งนุ่มนวล */
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease, background-color 0.2s ease, backdrop-filter 0.3s ease; 
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            color: rgba(255, 255, 255, 0.3); font-size: 1.6rem; font-weight: bold; user-select: none; position: relative;
            transform-origin: center;
        }
        .grid-tile:hover { background-color: #353b48; color: rgba(255, 255, 255, 0.8); box-shadow: inset 0 0 15px rgba(0,0,0,0.3); }
        
        /* คลาสใหม่สำหรับการเปิดป้าย (3D Flip) */
        .grid-tile.opened {
            transform: rotateX(90deg) scale(0.8);
            opacity: 0;
            pointer-events: none;
        }

        .grid-tile.locked {
            background-color: transparent !important;
            color: rgba(252, 92, 101, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); 
        }
        .grid-tile.locked::after {
            content: "🔒"; position: absolute; font-size: 1.8rem; color: var(--danger-color);
            opacity: 0.8; pointer-events: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .grid-tile.locked:hover::after { opacity: 1; transform: scale(1.25); }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border-color: rgba(252, 92, 101, 0.5) !important; background-color: rgba(252, 92, 101, 0.1) !important; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(3px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-5px, 0, 0); }
            40%, 60% { transform: translate3d(5px, 0, 0); }
        }

        #loading-indicator {
            position: absolute; display: flex; flex-direction: column; justify-content: center;
            align-items: center; color: var(--primary-color); font-weight: bold; font-size: 1.1rem;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #loading-indicator.show { opacity: 1; }
        .spinner {
            width: 45px; height: 45px; border: 4px solid rgba(15, 185, 177, 0.2); border-top: 4px solid var(--primary-color); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px; box-shadow: 0 0 15px rgba(15, 185, 177, 0.3);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Guessing System & Hint UI */
        .guessing-section { margin-top: 25px; display: flex; gap: 12px; width: 100%; max-width: 450px; align-items: center; flex-direction: column; }
        .guessing-input-group { display: flex; gap: 10px; width: 100%; }
        .guessing-input-group input {
            flex: 1; padding: 14px 18px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; font-size: 1.15rem; outline: none; text-align: center; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .guessing-input-group input:focus { border-color: var(--primary-color); background: rgba(0,0,0,0.6); box-shadow: 0 0 15px rgba(15, 185, 177, 0.2); }
        .guessing-input-group button {
            background: var(--primary-color); border: none; color: white; padding: 0 25px; border-radius: 10px; font-size: 1.15rem; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(15, 185, 177, 0.3);
        }
        .guessing-input-group button:hover { background: #0c9c95; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(15, 185, 177, 0.4); }
        
        .hint-btn {
            background: transparent; border: 2px solid var(--edit-color); color: var(--edit-color);
            padding: 8px 20px; border-radius: 25px; font-size: 0.95rem; margin-top: 5px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .hint-btn:hover { background: rgba(254, 211, 48, 0.15); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(254, 211, 48, 0.2); }
        .hint-display {
            font-size: 1.6rem; letter-spacing: 3px; color: var(--edit-color); margin-top: 10px; font-family: 'Courier New', Courier, monospace; display: none; text-shadow: 0 2px 4px rgba(0,0,0,0.8); background: rgba(0,0,0,0.3); padding: 10px 25px; border-radius: 8px; border: 1px dashed rgba(254, 211, 48, 0.3);
        }

        .guess-feedback { font-weight: bold; font-size: 1.1rem; height: 25px; transition: 0.2s; margin-top: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        #character-info { margin-top: 20px; opacity: 0; transform: translateY(15px); transition: opacity 0.5s ease, transform 0.5s ease; height: 90px; }
        #character-info.revealed { opacity: 1; transform: translateY(0); }
        #char-name { font-size: 2.8rem; margin-bottom: 5px; color: var(--primary-color); text-shadow: 0 4px 8px rgba(0,0,0,0.6); letter-spacing: 1px; }
        #char-game { font-size: 1.3rem; color: #d2dae2; opacity: 0.9; }

        .controls-hint { margin-top: 15px; padding: 12px 25px; background: rgba(0, 0, 0, 0.2); border-radius: 10px; color: #808e9b; font-size: 0.95rem; letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.05); }
        kbd { background-color: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px; color: white; font-family: monospace; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

        /* History Modal */
        #history-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85);
            display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(5px);
        }
        #history-modal.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--bg-color-top); width: 90%; max-width: 550px; max-height: 80vh;
            border-radius: 16px; padding: 30px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .close-btn { background: none; border: none; color: #aaa; font-size: 32px; cursor: pointer; line-height: 1; transition: 0.2s; }
        .close-btn:hover { color: var(--danger-color); transform: scale(1.1); }
        .history-list { flex: 1; overflow-y: auto; list-style: none; padding-right: 5px; }
        .history-list::-webkit-scrollbar { width: 6px; }
        .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        .history-item {
            display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); padding: 12px; margin-bottom: 12px;
            border-radius: 10px; border-left: 4px solid var(--primary-color); transition: 0.2s;
        }
        .history-item:hover { background: rgba(0,0,0,0.4); transform: translateX(3px); }
        .history-img { width: 65px; height: 65px; border-radius: 8px; object-fit: cover; background: #000; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
        .history-info { display: flex; flex-direction: column; overflow: hidden; }
        .history-info strong { font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--primary-color); margin-bottom: 3px; }
        .history-info small { color: #d2dae2; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0.8; }

        .app-version { position: absolute; bottom: 10px; right: 15px; font-size: 0.8rem; color: rgba(255,255,255,0.2); pointer-events: none; }
    </style>
</head>
<body>

    <div class="scoreboard-container">
        <div class="scoreboard-header">
            <span>👥 ผู้เล่น & คะแนน</span>
            <button style="background:none; border:none; color:var(--danger-color); cursor:pointer; font-size:0.8rem; opacity:0.8; transition:0.2s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'" onclick="resetScores()">รีเซ็ต</button>
        </div>
        <ul class="player-list" id="players-list"></ul>
        <div class="add-player-box">
            <input type="text" id="new-player-name" placeholder="เพิ่มชื่อผู้เล่น..." onkeypress="if(event.key === 'Enter') addPlayer()">
            <button onclick="addPlayer()">+</button>
        </div>
    </div>

    <div class="top-menu">
        <button id="btn-history" class="btn-menu">🕒 ประวัติการทาย</button>
        <a href="admin.html" id="admin-link" class="btn-menu">⚙️ จัดการข้อมูล</a>
    </div>

    <div class="game-filter-container" id="game-filters">
        <label class="filter-label" style="margin-right: 15px; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 15px;">
            <input type="checkbox" id="toggle-timer" checked> ⏳ เปิดจับเวลา 15 วิ
        </label>
        
        <label class="filter-label"><input type="checkbox" value="Genshin Impact" checked> Genshin Impact</label>
        <label class="filter-label"><input type="checkbox" value="Honkai: Star Rail" checked> Honkai: Star Rail</label>
        <label class="filter-label"><input type="checkbox" value="Arknights" checked> Arknights</label>
        <label class="filter-label"><input type="checkbox" value="Blue Archive" checked> Blue Archive</label>
        <label class="filter-label"><input type="checkbox" value="Zenless Zone Zero" checked> Zenless Zone Zero</label>
    </div>

    <div id="game-container">
        <div class="status-badges">
            <div class="round-bonus-badge">
                🏆 โบนัส: <span id="round-bonus-display">36</span>
            </div>
            <div class="timer-badge" id="timer-display">⏳ รอเปิดป้าย...</div>
        </div>

        <div id="image-wrapper">
            <div id="loading-indicator">
                <div class="spinner"></div>
                <span id="loading-text">กำลังค้นหาตัวละครใหม่...</span>
            </div>
            <img id="character-img" src="" alt="Gacha Character">
            <div id="grid-overlay"></div>
        </div>

        <div class="guessing-section" id="guessing-section">
            <div class="guessing-input-group">
                <input type="text" id="guess-input" placeholder="พิมพ์ชื่อตัวละครที่นี่..." autocomplete="off">
                <button onclick="submitGuess()">ตอบ!</button>
            </div>
            <button id="btn-hint" class="hint-btn" onclick="requestHint()">💡 ขอคำใบ้ (-10 โบนัส)</button>
            <div class="hint-display" id="hint-display"></div>
            <div class="guess-feedback" id="guess-feedback"></div>
        </div>
        
        <div id="character-info">
            <h1 id="char-name">ชื่อตัวละคร</h1>
            <h2 id="char-game">จากเกม</h2>
        </div>

        <div class="controls-hint">
            <kbd>คลิกป้าย</kbd> เปิดช่อง&nbsp;&nbsp;|&nbsp;&nbsp;<kbd>R</kbd> เฉลย/ยอมแพ้&nbsp;&nbsp;|&nbsp;&nbsp;<kbd>Enter</kbd> สุ่มตัวถัดไป
        </div>
    </div>

    <!-- History Modal -->
    <div id="history-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🕒 ประวัติการทาย (รอบนี้)</h2>
                <button class="close-btn" id="close-history-btn">&times;</button>
            </div>
            <ul class="history-list" id="history-list"></ul>
        </div>
    </div>

    <div class="app-version">v6.0 - Modern UI Update</div>

    <script>
        const GAME_TAGS = {
            "Genshin Impact": "genshin_impact",
            "Honkai: Star Rail": "honkai:_star_rail",
            "Arknights": "arknights",
            "Blue Archive": "blue_archive",
            "Zenless Zone Zero": "zenless_zone_zero"
        };

        // --- Safe Globals ---
        let localCharacters = []; 
        let currentCharacter = null;
        let isRevealed = false;
        let isLoading = false;
        let unrevealedTiles = [];
        let playHistory = []; 
        let retryCount = 0;
        
        let players = [];
        let activePlayerId = null;
        let hasAwarded = false;

        let timerInterval = null;
        let timeLeft = 15;

        // Hint globals
        let hintLevel = 0;
        let hintPenalty = 0;

        const UNLOCK_THRESHOLD = 12;
        const LOCKED_COUNT = 6; 
        const PENALTY_POINTS = 5; 
        const MAX_RETRIES = 10; 
        const GRID_ROWS = 6; 
        const GRID_COLS = 6; 

        let dom = {};

        function loadSafePlayers() {
            try {
                const rawPlayers = localStorage.getItem('gachaPlayers');
                players = rawPlayers ? JSON.parse(rawPlayers) : [];
                if (!Array.isArray(players)) players = [];
            } catch (e) {
                console.warn("Player data corrupted, resetting...", e);
                players = [];
                localStorage.removeItem('gachaPlayers');
            }
        }

        function loadLocalData() {
            try {
                const rawData = localStorage.getItem('gachaGameData');
                localCharacters = rawData ? JSON.parse(rawData) : [];
                if (!Array.isArray(localCharacters)) localCharacters = [];
            } catch (e) {
                console.warn("Game data corrupted, resetting...", e);
                localCharacters = [];
                localStorage.removeItem('gachaGameData');
            }
        }

        function init() {
            dom = {
                img: document.getElementById('character-img'),
                gridOverlay: document.getElementById('grid-overlay'),
                infoBox: document.getElementById('character-info'),
                nameDisplay: document.getElementById('char-name'),
                gameDisplay: document.getElementById('char-game'),
                loading: document.getElementById('loading-indicator'),
                loadingText: document.getElementById('loading-text'),
                filterCheckboxes: document.querySelectorAll('#game-filters input[type="checkbox"]'),
                btnHistory: document.getElementById('btn-history'),
                historyModal: document.getElementById('history-modal'),
                closeHistoryBtn: document.getElementById('close-history-btn'),
                historyList: document.getElementById('history-list'),
                playersList: document.getElementById('players-list'),
                newPlayerInput: document.getElementById('new-player-name'),
                roundBonusDisplay: document.getElementById('round-bonus-display'),
                timerDisplay: document.getElementById('timer-display'),
                toggleTimer: document.getElementById('toggle-timer'),
                guessingSection: document.getElementById('guessing-section'),
                guessInput: document.getElementById('guess-input'),
                guessFeedback: document.getElementById('guess-feedback'),
                btnHint: document.getElementById('btn-hint'),
                hintDisplay: document.getElementById('hint-display')
            };

            loadLocalData();
            loadSafePlayers();
            setupEventListeners();
            renderPlayers();
            loadRandomCharacter();

            window.addEventListener('storage', (e) => {
                if (e.key === 'gachaGameData') loadLocalData();
                if (e.key === 'gachaPlayers') {
                    loadSafePlayers();
                    renderPlayers();
                }
            });
        }

        function formatCharacterName(tagString) {
            if (!tagString) return null;
            let firstTag = tagString.split(' ')[0];
            firstTag = firstTag.replace(/\_\([^)]+\)/g, '');
            firstTag = firstTag.replace(/\([^)]+\)/g, '');
            let nameWithSpaces = firstTag.replace(/_/g, ' ');
            return nameWithSpaces.replace(/\b\w/g, char => char.toUpperCase()).trim();
        }

        function handleAutoRetry(errorMessage) {
            if (retryCount < MAX_RETRIES) {
                retryCount++;
                if(dom.loadingText) dom.loadingText.textContent = `ค้นหาตัวละครใหม่... (ครั้งที่ ${retryCount})`;
                isLoading = false; 
                setTimeout(() => loadRandomCharacter(), 800);
            } else {
                isLoading = false;
                retryCount = 0;
                showError(errorMessage + " (ข้ามภาพอัตโนมัติเกินขีดจำกัด)");
            }
        }

        async function loadRandomCharacter() {
            if (isLoading) return;

            const selectedGames = Array.from(dom.filterCheckboxes).filter(cb => cb.checked).map(cb => cb.value);
            if (selectedGames.length === 0) {
                alert("กรุณาเลือกเกมอย่างน้อย 1 เกมครับ!");
                return;
            }

            isLoading = true;
            isRevealed = false;
            hasAwarded = false; 
            
            hintLevel = 0;
            hintPenalty = 0;
            
            if(dom.guessInput) dom.guessInput.value = '';
            if(dom.guessFeedback) dom.guessFeedback.textContent = '';
            if(dom.guessingSection) dom.guessingSection.style.display = 'flex'; 
            if(dom.hintDisplay) {
                dom.hintDisplay.style.display = 'none';
                dom.hintDisplay.textContent = '';
            }
            
            if(dom.img) dom.img.style.opacity = 0; 
            if(dom.gridOverlay) dom.gridOverlay.innerHTML = ''; 
            if(dom.infoBox) dom.infoBox.classList.remove('revealed');
            if(dom.loading) dom.loading.classList.add('show');
            
            resetTimerUI();
            renderPlayers(); 
            
            if (retryCount === 0 && dom.loadingText) dom.loadingText.textContent = "กำลังค้นหาตัวละครแบบสุ่ม...";

            const localFiltered = localCharacters.filter(char => selectedGames.includes(char.game));
            const pickFromLocal = (localFiltered.length > 0 && Math.random() < 0.15);

            try {
                if (pickFromLocal) {
                    const localChar = localFiltered[Math.floor(Math.random() * localFiltered.length)];
                    currentCharacter = { name: localChar.name, game: localChar.game };
                    if(dom.img) dom.img.src = localChar.url;
                } else {
                    const randomGame = selectedGames[Math.floor(Math.random() * selectedGames.length)];
                    const gameApiTag = GAME_TAGS[randomGame];
                    const searchTags = `solo ${gameApiTag}`;
                    
                    const randomPage = Math.floor(Math.random() * 5) + 1;
                    const targetApiUrl = `https://safebooru.donmai.us/posts.json?limit=50&page=${randomPage}&tags=${encodeURIComponent(searchTags)}`;
                    
                    const response = await fetch(targetApiUrl);
                    if (!response.ok) throw new Error(`HTTP Error ${response.status}`);

                    const data = await response.json();
                    
                    const validPosts = data.filter(post => 
                        post.tag_string_character &&
                        (post.large_file_url || post.file_url) && 
                        !['mp4', 'zip', 'gif', 'webm'].includes(post.file_ext)
                    );

                    if (validPosts.length > 0) {
                        const randomPost = validPosts[Math.floor(Math.random() * validPosts.length)];
                        const extractedName = formatCharacterName(randomPost.tag_string_character);
                        
                        if (extractedName) {
                            currentCharacter = { name: extractedName, game: randomGame };
                            if(dom.img) dom.img.src = randomPost.large_file_url || randomPost.file_url;
                        } else {
                            throw new Error("สกัดชื่อตัวละครไม่สำเร็จ");
                        }
                    } else {
                        throw new Error("ไม่พบภาพที่ใช้งานได้ในหน้านี้");
                    }
                }
            } catch (error) {
                console.warn("Fetch Error (Retrying):", error.message);
                handleAutoRetry(`ภาพไม่มีคำตอบ หรือถูกบล็อกการเชื่อมต่อ`);
            }
        }

        window.onloadLogic = () => {
            if(!currentCharacter) return;
            retryCount = 0; 
            if(dom.loading) dom.loading.classList.remove('show');
            if(dom.img) dom.img.style.opacity = 1; 
            createGrid();
            isLoading = false;
        };
        
        window.onerrorLogic = () => {
            handleAutoRetry("ไฟล์รูปต้นทางเสียหาย หรือถูกบล็อก");
        };

        function showError(message) {
            if(dom.loading) dom.loading.classList.remove('show');
            if(dom.img) dom.img.style.opacity = 0; 
            unrevealedTiles = []; 
            if(dom.gridOverlay) dom.gridOverlay.innerHTML = `
                <div style="background: rgba(252, 92, 101, 0.1); border: 2px dashed #fc5c65; border-radius: 12px; color: #fc5c65; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; padding: 30px; text-align: center;">
                    <span style="font-size: 3.5rem; margin-bottom: 10px;">⚠️</span>
                    <strong style="font-size: 1.4rem;">ข้อผิดพลาด</strong>
                    <p style="font-size: 1rem; margin-top: 8px; color: #d2dae2;">${message}</p>
                    <small style="margin-top: 20px; padding: 8px 15px; background: rgba(255,255,255,0.1); border-radius: 6px;">กด Enter เพื่อสั่งสุ่มใหม่</small>
                </div>
            `;
            if (currentCharacter) {
                if(dom.nameDisplay) dom.nameDisplay.textContent = currentCharacter.name;
                if(dom.gameDisplay) dom.gameDisplay.textContent = currentCharacter.game;
            }
            if(dom.infoBox) dom.infoBox.classList.add('revealed'); 
            renderPlayers();
        }

        function createGrid() {
            if(!dom.gridOverlay) return;
            dom.gridOverlay.innerHTML = '';
            dom.gridOverlay.style.gridTemplateColumns = `repeat(${GRID_COLS}, 1fr)`;
            dom.gridOverlay.style.gridTemplateRows = `repeat(${GRID_ROWS}, 1fr)`;
            unrevealedTiles = [];
            
            const totalTilesCount = GRID_ROWS * GRID_COLS;
            const indices = Array.from({length: totalTilesCount}, (_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            const lockedIndices = indices.slice(0, LOCKED_COUNT);
            
            for (let i = 0; i < totalTilesCount; i++) {
                const tile = document.createElement('div');
                tile.className = 'grid-tile';
                tile.textContent = i + 1;
                
                if (lockedIndices.includes(i)) {
                    tile.classList.add('locked');
                    tile.dataset.isLocked = "true"; 
                } else {
                    tile.dataset.isLocked = "false";
                }
                
                tile.addEventListener('click', function() {
                    // เปลี่ยนจากการเช็ค opacity เป็นการเช็คคลาส opened
                    if (isRevealed || this.classList.contains('opened') || isLoading) return;
                    
                    if (this.dataset.isLocked === "true") {
                        const openedCount = totalTilesCount - unrevealedTiles.length;
                        if (openedCount < UNLOCK_THRESHOLD) {
                            this.classList.remove('shake');
                            void this.offsetWidth; 
                            this.classList.add('shake');
                            
                            if(dom.guessFeedback) {
                                dom.guessFeedback.textContent = `🔒 ต้องเปิดป้ายปกติอีก ${UNLOCK_THRESHOLD - openedCount} แผ่น เพื่อปลดล็อก!`;
                                dom.guessFeedback.style.color = "var(--edit-color)";
                            }
                            return; 
                        } else {
                            this.classList.remove('locked');
                            this.dataset.isLocked = "false";
                        }
                    }

                    // ใช้คลาส .opened เพื่อเล่น 3D Animation
                    this.classList.add('opened');
                    const index = unrevealedTiles.indexOf(this);
                    if (index > -1) unrevealedTiles.splice(index, 1);
                    
                    updateLockedTilesVisuals();
                    renderPlayers();
                    startTimer();
                    checkIfAllRevealed();
                });
                
                dom.gridOverlay.appendChild(tile);
                unrevealedTiles.push(tile);
            }
            renderPlayers();
        }

        function updateLockedTilesVisuals() {
            const totalTilesCount = GRID_ROWS * GRID_COLS;
            const openedCount = totalTilesCount - unrevealedTiles.length;
            if (openedCount >= UNLOCK_THRESHOLD) {
                unrevealedTiles.forEach(tile => {
                    if (tile.dataset.isLocked === "true") {
                        tile.classList.remove('locked');
                        tile.dataset.isLocked = "false";
                    }
                });
                if (openedCount === UNLOCK_THRESHOLD && !isRevealed && dom.guessFeedback) {
                    dom.guessFeedback.textContent = "🔓 ปลดล็อกแผ่นป้ายพิเศษแล้ว!";
                    dom.guessFeedback.style.color = "var(--success-color)";
                    setTimeout(() => {
                        if(dom.guessFeedback.textContent.includes("ปลดล็อก")) dom.guessFeedback.textContent = "";
                    }, 3000);
                }
            }
        }

        function openRandomTile() {
            if (isRevealed || unrevealedTiles.length === 0 || isLoading) return;
            const totalTilesCount = GRID_ROWS * GRID_COLS;
            const openedCount = totalTilesCount - unrevealedTiles.length;
            
            const availableTiles = unrevealedTiles.filter(tile => 
                tile.dataset.isLocked === "false" || openedCount >= UNLOCK_THRESHOLD
            );
            if (availableTiles.length === 0) return; 
            
            const randomIndex = Math.floor(Math.random() * availableTiles.length);
            const tileToOpen = availableTiles[randomIndex];
            
            tileToOpen.classList.add('opened');
            
            const realIndex = unrevealedTiles.indexOf(tileToOpen);
            if (realIndex > -1) unrevealedTiles.splice(realIndex, 1);
            
            updateLockedTilesVisuals();
            renderPlayers();
            startTimer(); 
            checkIfAllRevealed();
        }

        function revealAll() {
            if (isRevealed || !currentCharacter || isLoading) return;
            unrevealedTiles.forEach(tile => {
                tile.classList.remove('locked');
                tile.classList.add('opened');
            });
            revealCharacterInfo();
        }

        function checkAnswerSimilarity(guess, actual) {
            let a = actual.toLowerCase().replace(/[^a-z0-9]/g, '');
            let b = guess.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (b.length === 0) return false;
            
            if (a.includes(b) && b.length >= 4) return true;
            if (b.includes(a) && a.length >= 4) return true;
            
            let matrix = [];
            for(let i = 0; i <= b.length; i++){ matrix[i] = [i]; }
            for(let j = 0; j <= a.length; j++){ matrix[0][j] = j; }
            
            for(let i = 1; i <= b.length; i++){
                for(let j = 1; j <= a.length; j++){
                    if(b.charAt(i-1) == a.charAt(j-1)){
                        matrix[i][j] = matrix[i-1][j-1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i-1][j-1] + 1, Math.min(matrix[i][j-1] + 1, matrix[i-1][j] + 1));
                    }
                }
            }
            let distance = matrix[b.length][a.length];
            let similarityPercentage = (1 - distance / Math.max(a.length, b.length)) * 100;
            return similarityPercentage >= 70;
        }

        window.requestHint = function() {
            if (!currentCharacter || isRevealed || isLoading) return;
            
            if (hintLevel >= 3) {
                if(dom.guessFeedback) {
                    dom.guessFeedback.textContent = "⚠️ ใช้คำใบ้ครบ 3 ครั้งแล้ว!";
                    dom.guessFeedback.style.color = "var(--edit-color)";
                }
                return;
            }

            hintPenalty += 10; 
            hintLevel++;
            
            const name = currentCharacter.name;
            let result = "";
            let visibleCount = 0;

            for (let i = 0; i < name.length; i++) {
                if (name[i] === ' ') {
                    result += '   '; 
                } else {
                    if (visibleCount < hintLevel) {
                        result += name[i] + ' ';
                        visibleCount++;
                    } else {
                        result += '_ ';
                    }
                }
            }
            
            if(dom.hintDisplay) {
                dom.hintDisplay.textContent = result.trim();
                dom.hintDisplay.style.display = 'block';
            }
            renderPlayers();
        };

        window.submitGuess = function() {
            if (isRevealed || !currentCharacter) return;
            if(!dom.guessInput) return;
            const guess = dom.guessInput.value.trim();
            if(!guess) return;

            const isCorrect = checkAnswerSimilarity(guess, currentCharacter.name);
            
            if(isCorrect) {
                if(dom.guessFeedback) {
                    dom.guessFeedback.textContent = "✅ ถูกต้องยอดเยี่ยม!";
                    dom.guessFeedback.style.color = "var(--success-color)";
                }
                
                const baseBonus = unrevealedTiles.length > 0 ? unrevealedTiles.length : 36;
                const currentBonus = Math.max(0, baseBonus - hintPenalty);
                
                if(activePlayerId && !hasAwarded) awardPoints(activePlayerId, currentBonus);
                
                revealAll();
            } else {
                let penaltyMsg = "❌ ยังไม่ถูก ลองพิมพ์ใหม่!";
                
                if(activePlayerId) {
                    const player = players.find(p => p.id === activePlayerId);
                    if(player) {
                        player.score -= PENALTY_POINTS; 
                        savePlayers();
                        renderPlayers();
                        penaltyMsg = `❌ ยังไม่ถูก! โดนหัก ${PENALTY_POINTS} คะแนน`;
                    }
                }

                if(dom.guessFeedback) {
                    dom.guessFeedback.textContent = penaltyMsg;
                    dom.guessFeedback.style.color = "var(--danger-color)";
                    dom.guessFeedback.style.transform = "translateX(-10px)";
                    setTimeout(() => dom.guessFeedback.style.transform = "translateX(10px)", 100);
                    setTimeout(() => dom.guessFeedback.style.transform = "translateX(0)", 200);
                }
                dom.guessInput.value = '';
                dom.guessInput.focus();
            }
        };

        function startTimer() {
            if (isRevealed || isLoading || !dom.timerDisplay || !dom.toggleTimer) return;
            clearInterval(timerInterval);
            
            if (!dom.toggleTimer.checked) {
                dom.timerDisplay.style.display = 'none';
                return;
            }
            dom.timerDisplay.style.display = 'inline-block';
            
            timeLeft = 15;
            dom.timerDisplay.textContent = `⏱️ เวลาที่เหลือ: ${timeLeft} วิ`;
            dom.timerDisplay.style.color = "var(--edit-color)";
            dom.timerDisplay.style.borderColor = "rgba(254, 211, 48, 0.2)";
            dom.timerDisplay.style.background = "rgba(255, 255, 255, 0.05)";

            timerInterval = setInterval(() => {
                timeLeft--;
                dom.timerDisplay.textContent = `⏱️ เวลาที่เหลือ: ${timeLeft} วิ`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    dom.timerDisplay.textContent = "⏰ หมดเวลา! เปิดช่องใหม่เพื่อเริ่มนับใหม่";
                    dom.timerDisplay.style.color = "var(--danger-color)";
                    dom.timerDisplay.style.borderColor = "rgba(252, 92, 165, 0.3)";
                    dom.timerDisplay.style.background = "rgba(252, 92, 165, 0.1)";
                }
            }, 1000);
        }

        function resetTimerUI() {
            clearInterval(timerInterval);
            timeLeft = 15;
            if(!dom.timerDisplay || !dom.toggleTimer) return;
            if(!dom.toggleTimer.checked) {
                dom.timerDisplay.style.display = 'none';
                return;
            }
            dom.timerDisplay.style.display = 'inline-block';
            dom.timerDisplay.textContent = "⏳ รอเปิดป้าย...";
            dom.timerDisplay.style.color = "var(--edit-color)";
            dom.timerDisplay.style.borderColor = "rgba(254, 211, 48, 0.2)";
            dom.timerDisplay.style.background = "rgba(255, 255, 255, 0.05)";
        }

        function savePlayers() { 
            try {
                localStorage.setItem('gachaPlayers', JSON.stringify(players)); 
            } catch(e) { console.warn("Failed to save players", e); }
        }

        function renderPlayers() {
            if(!dom.playersList) return;
            dom.playersList.innerHTML = '';
            
            const baseBonus = unrevealedTiles.length > 0 ? unrevealedTiles.length : (isRevealed ? 0 : 36);
            const currentBonus = Math.max(0, baseBonus - hintPenalty);
            
            if (dom.roundBonusDisplay) dom.roundBonusDisplay.textContent = currentBonus;

            const isAwardPhase = isRevealed && !isLoading && currentCharacter && !hasAwarded;
            const sortedPlayers = [...players].sort((a, b) => b.score - a.score);

            if(sortedPlayers.length === 0) {
                dom.playersList.innerHTML = '<li style="text-align:center; color:#808e9b; font-size:0.85rem; padding:10px;">เพิ่มชื่อผู้เล่นด้านล่าง</li>';
                return;
            }

            sortedPlayers.forEach(p => {
                const isNegative = p.score < 0;
                const li = document.createElement('li');
                li.className = `player-item ${p.id === activePlayerId ? 'active' : ''} ${isAwardPhase ? 'can-award' : ''}`;
                li.onclick = (e) => {
                    if(!e.target.closest('button')) {
                        activePlayerId = p.id;
                        renderPlayers();
                    }
                };
                li.innerHTML = `
                    <span class="player-name">${p.name}</span>
                    <span class="player-score ${isNegative ? 'negative' : ''}">${p.score}</span>
                    ${isAwardPhase ? `<button class="award-btn" onclick="awardPoints('${p.id}', ${currentBonus}); event.stopPropagation();">+${currentBonus}</button>` : ''}
                    ${!isAwardPhase ? `<button class="delete-btn" onclick="removePlayer('${p.id}'); event.stopPropagation();" title="ลบผู้เล่น">×</button>` : ''}
                `;
                dom.playersList.appendChild(li);
            });
        }

        window.addPlayer = function() {
            if(!dom.newPlayerInput) return;
            const name = dom.newPlayerInput.value.trim();
            if(name) {
                players.push({ id: Date.now().toString(), name: name, score: 0 });
                savePlayers();
                dom.newPlayerInput.value = '';
                if(players.length === 1) activePlayerId = players[0].id;
                renderPlayers();
            }
        };

        window.removePlayer = function(id) {
            if(confirm('ต้องการลบผู้เล่นนี้ใช่หรือไม่?')) {
                players = players.filter(p => p.id !== id);
                if(activePlayerId === id) activePlayerId = players.length > 0 ? players[0].id : null;
                savePlayers();
                renderPlayers();
            }
        };

        window.resetScores = function() {
            if(confirm('ต้องการรีเซ็ตคะแนนทุกคนเป็น 0 ใช่หรือไม่?')) {
                players.forEach(p => p.score = 0);
                savePlayers();
                renderPlayers();
            }
        };

        window.awardPoints = function(id, points) {
            if(hasAwarded) return; 
            const player = players.find(p => p.id === id);
            if(player) {
                player.score += points;
                hasAwarded = true; 
                savePlayers();
                renderPlayers(); 
            }
        };

        function checkIfAllRevealed() {
            if (unrevealedTiles.length === 0) revealCharacterInfo();
        }

        function revealCharacterInfo() {
            if (isRevealed) return;
            isRevealed = true;
            
            clearInterval(timerInterval);
            if(dom.toggleTimer && dom.toggleTimer.checked && dom.timerDisplay) {
                dom.timerDisplay.textContent = "🏁 เฉลยแล้ว!";
            }
            
            if(dom.guessingSection) dom.guessingSection.style.display = 'none';
            
            if (currentCharacter) {
                if(dom.nameDisplay) dom.nameDisplay.textContent = currentCharacter.name;
                if(dom.gameDisplay) dom.gameDisplay.textContent = currentCharacter.game;
            }

            if(dom.infoBox) dom.infoBox.classList.add('revealed');
            renderPlayers();
            
            if (currentCharacter && dom.img && dom.img.src) {
                if (playHistory.length === 0 || playHistory[0].url !== dom.img.src) {
                    playHistory.unshift({ name: currentCharacter.name, game: currentCharacter.game, url: dom.img.src });
                }
            }
        }

        function openHistoryModal() {
            if(!dom.historyList) return;
            dom.historyList.innerHTML = '';
            if (playHistory.length === 0) {
                dom.historyList.innerHTML = '<li style="text-align:center; color:#808e9b; padding:20px;">ยังไม่มีประวัติการทายในรอบนี้</li>';
            } else {
                playHistory.forEach((item) => {
                    const li = document.createElement('li');
                    li.className = 'history-item';
                    li.innerHTML = `
                        <img src="${item.url}" alt="History Image" class="history-img" onerror="this.src='https://placehold.co/60x60/2d3436/0fb9b1?text=Error'">
                        <div class="history-info">
                            <strong>${item.name}</strong>
                            <small>${item.game}</small>
                        </div>
                    `;
                    dom.historyList.appendChild(li);
                });
            }
            if(dom.historyModal) dom.historyModal.classList.add('show');
            if(dom.btnHistory) dom.btnHistory.blur();
        }

        function closeHistoryModal() { if(dom.historyModal) dom.historyModal.classList.remove('show'); }

        function setupEventListeners() {
            if(dom.filterCheckboxes) dom.filterCheckboxes.forEach(cb => { cb.addEventListener('change', function() { this.blur(); }); });
            if(dom.toggleTimer) dom.toggleTimer.addEventListener('change', function() { resetTimerUI(); this.blur(); });
            if(dom.btnHistory) dom.btnHistory.addEventListener('click', openHistoryModal);
            if(dom.closeHistoryBtn) dom.closeHistoryBtn.addEventListener('click', closeHistoryModal);

            if(dom.guessInput) {
                dom.guessInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') submitGuess();
                });
            }

            if(dom.img) {
                dom.img.addEventListener('load', window.onloadLogic);
                dom.img.addEventListener('error', window.onerrorLogic);
            }

            document.addEventListener('keydown', (e) => {
                if (document.activeElement.tagName === 'INPUT') return;
                if (dom.historyModal && dom.historyModal.classList.contains('show')) return; 

                if (e.code === 'Space') {
                    e.preventDefault(); 
                    if (!isRevealed) openRandomTile();
                } else if (e.code === 'KeyR') {
                    e.preventDefault();
                    revealAll();
                } else if (e.code === 'Enter') {
                    e.preventDefault();
                    if (!isRevealed && currentCharacter) {
                        unrevealedTiles = []; 
                        revealAll();
                    }
                    if (!isLoading) {
                        retryCount = 0; 
                        loadRandomCharacter();
                    }
                }
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
